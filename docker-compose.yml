version: '3.8'

services:
  # Database Service (MySQL 5.7)
  db:
    image: mysql:5.7
    container_name: challenge_db_container
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d # Mounts schema and seeds for auto-initialization
    networks:
      - app-network

  # Web Server Service (Apache + PHP)
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: challenge_web_container
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8080:80" # Map host port 8080 to container port 80
    volumes:
      - ./:/var/www/html # Mount the entire project directory for live development
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
